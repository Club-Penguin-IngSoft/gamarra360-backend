# =============================================================================
# Gamarra 360° — Configuración base
#
# Esta configuración es común a todos los entornos. Los detalles de BD por
# entorno viven en application-local.yml (Docker local / dev) y
# application-aws.yml (producción AWS RDS).
#
# Para correr local:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Para correr con AWS RDS:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=aws
#
# Las credenciales NUNCA se commitean. Se pasan como variables de entorno.
# =============================================================================

spring:
  application:
    name: gamarra360-backend

  # Perfil por defecto: 'local'. Override con -Dspring-boot.run.profiles=...
  profiles:
    default: local

  jpa:
    # validate: Hibernate solo verifica que las entidades coincidan con el schema.
    # NO modifica la BD — el schema lo maneja el SQL del equipo de BD.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Naming strategy: respeta los nombres snake_case de la BD
        # (productos, id_producto, etc.) en lugar de camelCase
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        dialect: org.hibernate.dialect.MySQLDialect
        # SQL en logs durante dev — desactivar en producción
        format_sql: true
    show-sql: false  # cambiar a true para debugging

server:
  port: 8080
  servlet:
    # Todas las rutas REST quedan bajo /api/v1 (CLAUDE.md §5)
    context-path: /api/v1

# Endpoint /actuator/health para monitoreo (AWS ELB, etc.)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.gamarra360: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
