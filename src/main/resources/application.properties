spring.application.name=gamarra360-backend-uml
server.port=8080

# --- CONEXIÓN A AWS RDS ---
spring.datasource.url=jdbc:mysql://gamarra360.cg73batqxghy.us-east-1.rds.amazonaws.com:3306/gamarra360?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=gamarra360
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN DE HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SEGURIDAD JWT ---
app.jwt.secret=${JWT_SECRET:gamarra360-secret-key-local-development-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- LOGS ---
logging.level.root=WARN
logging.level.com.gamarra360=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.apache.catalina=WARN
logging.level.com.zaxxer.hikari=WARN

logging.file.name=logs/gamarra360-backend.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level usuario=%X{usuario} accion=%X{accion} recurso=%X{recurso} metodo=%X{metodo} ruta=%X{ruta} ip=%X{ip} clase=%logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level usuario=%X{usuario} accion=%X{accion} recurso=%X{recurso} metodo=%X{metodo} ruta=%X{ruta} ip=%X{ip} clase=%logger{36} - %msg%n

logging.logback.rollingpolicy.file-name-pattern=logs/gamarra360-backend-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=200MB