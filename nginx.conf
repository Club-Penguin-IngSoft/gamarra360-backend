# ============================================================
# nginx.conf — Reverse proxy para Gamarra 360° en EC2
#
# Instalación:
#   sudo cp nginx.conf /etc/nginx/sites-available/gamarra360
#   sudo ln -s /etc/nginx/sites-available/gamarra360 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL con Let's Encrypt (Certbot):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d gamarra360.duckdns.org
# ============================================================

server {
    listen 80;
    server_name gamarra360.duckdns.org;

    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gamarra360.duckdns.org;

    # Certificados SSL (Certbot los genera automáticamente)
    ssl_certificate     /etc/letsencrypt/live/gamarra360.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gamarra360.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Cabeceras de seguridad
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy al backend Spring Boot
    location /api/ {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Para el webhook de Stripe: pasar el body sin alterar
        proxy_request_buffering off;
    }

    # Health check (para monitoreo)
    location /actuator/health {
        proxy_pass       http://localhost:8080;
        proxy_set_header Host $host;
        access_log       off;
    }
}
